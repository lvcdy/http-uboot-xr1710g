name: U-Boot CI for XR1710G

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gcc-aarch64-linux-gnu
    
    - name: Configure U-Boot for XR1710G
      run: |
        make xr1710g_defconfig CROSS_COMPILE=aarch64-linux-gnu-
    
    - name: Build U-Boot
      run: |
        make -j$(nproc) CROSS_COMPILE=aarch64-linux-gnu-
    
    - name: Verify build output
      run: |
        ls -la u-boot*
        file u-boot
        file u-boot.bin
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: u-boot-xr1710g
        path: |
          u-boot
          u-boot.bin
          u-boot.elf
          u-boot.srec
          u-boot.img